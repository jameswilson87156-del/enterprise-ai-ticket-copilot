spring:
  application:
    name: enterprise-ai-ticket-copilot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/enterprise_ai_ticket_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ticket_copilot
    password: change-me
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:demo-data.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

ai:
  provider: rule-engine
  human-confirmation-required: true
