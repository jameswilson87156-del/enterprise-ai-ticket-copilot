spring:
  application:
    name: enterprise-ai-ticket-copilot
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ticketcopilot;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 0

logging:
  level:
    com.enterpriseai.ticketcopilot: INFO
